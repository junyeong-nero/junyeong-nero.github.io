<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360" role="img" font-family="'Space Mono', ui-monospace, Menlo, Monaco, monospace">
  <title>Total token cost relative to full observation, per model</title>
  <rect x="0" y="0" width="720" height="360" fill="#f8f7f3"/>

  <!-- y grid + ticks (token ratio vs full) -->
  <g stroke="#e7e4dc" stroke-width="1">
    <line x1="56" y1="36" x2="700" y2="36"/>
    <line x1="56" y1="88.8" x2="700" y2="88.8"/>
    <line x1="56" y1="141.6" x2="700" y2="141.6"/>
    <line x1="56" y1="194.4" x2="700" y2="194.4"/>
    <line x1="56" y1="247.2" x2="700" y2="247.2"/>
  </g>
  <g fill="#93939f" font-size="11" text-anchor="end">
    <text x="48" y="40">1.5&#215;</text>
    <text x="48" y="92.8">1.2&#215;</text>
    <text x="48" y="145.6">0.9&#215;</text>
    <text x="48" y="198.4">0.6&#215;</text>
    <text x="48" y="251.2">0.3&#215;</text>
    <text x="48" y="303.6">0.0&#215;</text>
  </g>
  <line x1="56" y1="300" x2="700" y2="300" stroke="#d4d1c9" stroke-width="1"/>

  <!-- weak model group -->
  <rect x="115" y="124" width="42" height="176" rx="4" fill="#857f74"/>
  <rect x="169" y="83.5" width="42" height="216.5" rx="4" fill="#857f74"/>
  <rect x="223" y="57.1" width="42" height="242.9" rx="4" fill="#857f74"/>
  <rect x="277" y="243.7" width="42" height="56.3" rx="4" fill="#ff7759"/>
  <g font-size="12" font-weight="700" text-anchor="middle">
    <text x="136" y="116" fill="#2c2925">1.00&#215;</text>
    <text x="190" y="75.5" fill="#2c2925">1.23&#215;</text>
    <text x="244" y="49.1" fill="#2c2925">1.38&#215;</text>
    <text x="298" y="235.7" fill="#d9531f">0.32&#215;</text>
  </g>

  <!-- strong model group -->
  <rect x="437" y="124" width="42" height="176" rx="4" fill="#857f74"/>
  <rect x="491" y="132.8" width="42" height="167.2" rx="4" fill="#857f74"/>
  <rect x="545" y="113.4" width="42" height="186.6" rx="4" fill="#857f74"/>
  <rect x="599" y="108.2" width="42" height="191.8" rx="4" fill="#ff7759"/>
  <g font-size="12" font-weight="700" text-anchor="middle">
    <text x="458" y="116" fill="#2c2925">1.00&#215;</text>
    <text x="512" y="124.8" fill="#2c2925">0.95&#215;</text>
    <text x="566" y="105.4" fill="#2c2925">1.06&#215;</text>
    <text x="620" y="100.2" fill="#d9531f">1.09&#215;</text>
  </g>

  <!-- full = 1.0x reference line -->
  <line x1="56" y1="124" x2="700" y2="124" stroke="#93939f" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="378" y="119" text-anchor="middle" font-size="10.5" fill="#93939f">full = 1.0&#215;</text>

  <!-- per-bar policy labels -->
  <g fill="#52525b" font-size="10.5" text-anchor="middle">
    <text x="136" y="317">full</text>
    <text x="190" y="317">top-k</text>
    <text x="244" y="317">static</text>
    <text x="298" y="317">adaptive</text>
    <text x="458" y="317">full</text>
    <text x="512" y="317">top-k</text>
    <text x="566" y="317">static</text>
    <text x="620" y="317">adaptive</text>
  </g>

  <!-- model group labels -->
  <g font-size="12.5" font-weight="700" text-anchor="middle" fill="#52525b">
    <text x="217" y="342">Nemotron-3 &#183; weak</text>
    <text x="539" y="342">GPT-5.4-mini &#183; strong</text>
  </g>
</svg>
