<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post | Research Blog</title>
  <meta name="description" content="Research blog post">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="site-header">
    <nav class="header-nav">
      <a href="/portfolio/" class="back-link">Portfolio</a>
      <a href="/paper-review/" class="back-link">Paper Review</a>
      <a href="./" class="back-link">Research Blog</a>
    </nav>
  </header>

  <main class="detail-shell" data-post-detail>
    <div class="empty-state">
      <h2>Loading post</h2>
      <p>Reading post content.</p>
    </div>
  </main>

  <footer class="footer">
    <p>(c) 2026 Junyeong Song.</p>
  </footer>

  <script>
    (function () {
      var slug = new URLSearchParams(location.search).get('slug') || '';
      if (!slug) {
        document.querySelector('[data-post-detail]').innerHTML = '<p class="load-error">No post specified.</p>';
        return;
      }

      var shell = document.querySelector('[data-post-detail]');

      function escapeHtml(value) {
        return String(value || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function splitRow(line) {
        return line.trim().replace(/^\|/, '').replace(/\|$/, '').split('|')
          .map(function (c) { return c.trim(); });
      }

      function alignAttr(a) { return a ? ' style="text-align:' + a + '"' : ''; }

      function inlineMd(text) {
        var s = escapeHtml(text);
        var codes = [];
        s = s.replace(/`([^`]+)`/g, function (_, c) {
          codes.push(c);
          return '@@CODE' + (codes.length - 1) + '@@';
        });
        s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g,
          function (_, alt, src, title) {
            return '<img src="' + src + '" alt="' + alt + '"' +
              (title ? ' title="' + title + '"' : '') + '>';
          });
        s = s.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g,
          function (_, txt, href, title) {
            return '<a href="' + href + '"' + (title ? ' title="' + title + '"' : '') +
              '>' + txt + '</a>';
          });
        s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        s = s.replace(/__([^_]+)__/g, '<strong>$1</strong>');
        s = s.replace(/(^|[^*])\*([^*\s][^*]*?)\*/g, '$1<em>$2</em>');
        s = s.replace(/@@CODE(\d+)@@/g, function (_, n) {
          return '<code>' + codes[+n] + '</code>';
        });
        return s;
      }

      function markdownToHtml(md) {
        var lines = md.replace(/\r\n/g, '\n').split('\n');
        var html = [];
        var paragraph = [];
        var i = 0;

        function flushParagraph() {
          if (!paragraph.length) return;
          html.push('<p>' + inlineMd(paragraph.join(' ')) + '</p>');
          paragraph = [];
        }

        while (i < lines.length) {
          var trimmed = lines[i].trim();

          var fence = trimmed.match(/^```+\s*[\w-]*$/);
          if (fence) {
            flushParagraph();
            var buf = [];
            i++;
            while (i < lines.length && !/^```+\s*$/.test(lines[i].trim())) {
              buf.push(lines[i]); i++;
            }
            i++;
            html.push('<pre><code>' + escapeHtml(buf.join('\n')) + '</code></pre>');
            continue;
          }

          if (!trimmed) { flushParagraph(); i++; continue; }

          if (/^([-*_])\1{2,}$/.test(trimmed)) {
            flushParagraph(); html.push('<hr>'); i++; continue;
          }

          var heading = trimmed.match(/^(#{1,6})\s+(.+)$/);
          if (heading) {
            flushParagraph();
            var lv = heading[1].length;
            html.push('<h' + lv + '>' + inlineMd(heading[2]) + '</h' + lv + '>');
            i++; continue;
          }

          var figImg = trimmed.match(/^!\[([^\]]*)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)$/);
          if (figImg) {
            flushParagraph();
            html.push('<figure><img src="' + figImg[2] + '" alt="' +
              escapeHtml(figImg[1]) + '">' +
              (figImg[3] ? '<figcaption>' + inlineMd(figImg[3]) + '</figcaption>' : '') +
              '</figure>');
            i++; continue;
          }

          if (trimmed.indexOf('|') !== -1 && i + 1 < lines.length &&
              /^\s*\|?\s*:?-{1,}:?\s*(\|\s*:?-{1,}:?\s*)*\|?\s*$/.test(lines[i + 1].trim())) {
            flushParagraph();
            var head = splitRow(trimmed);
            var aligns = splitRow(lines[i + 1].trim()).map(function (c) {
              var l = c.charAt(0) === ':', r = c.charAt(c.length - 1) === ':';
              return (l && r) ? 'center' : r ? 'right' : l ? 'left' : '';
            });
            i += 2;
            var rows = [];
            while (i < lines.length && lines[i].trim() &&
                   lines[i].indexOf('|') !== -1) {
              rows.push(splitRow(lines[i].trim())); i++;
            }
            html.push('<div class="table-wrap"><table><thead><tr>' +
              head.map(function (c, ci) {
                return '<th' + alignAttr(aligns[ci]) + '>' + inlineMd(c) + '</th>';
              }).join('') + '</tr></thead><tbody>' +
              rows.map(function (r) {
                return '<tr>' + r.map(function (c, ci) {
                  return '<td' + alignAttr(aligns[ci]) + '>' + inlineMd(c) + '</td>';
                }).join('') + '</tr>';
              }).join('') + '</tbody></table></div>');
            continue;
          }

          if (/^>\s?/.test(trimmed)) {
            flushParagraph();
            var qbuf = [];
            while (i < lines.length && /^>\s?/.test(lines[i].trim())) {
              qbuf.push(lines[i].trim().replace(/^>\s?/, '')); i++;
            }
            html.push('<blockquote><p>' + inlineMd(qbuf.join(' ')) + '</p></blockquote>');
            continue;
          }

          if (/^[-*+]\s+/.test(trimmed)) {
            flushParagraph();
            var items = [];
            while (i < lines.length && /^[-*+]\s+/.test(lines[i].trim())) {
              items.push(lines[i].trim().replace(/^[-*+]\s+/, '')); i++;
            }
            html.push('<ul>' + items.map(function (x) {
              return '<li>' + inlineMd(x) + '</li>';
            }).join('') + '</ul>');
            continue;
          }

          if (/^\d+\.\s+/.test(trimmed)) {
            flushParagraph();
            var oitems = [];
            while (i < lines.length && /^\d+\.\s+/.test(lines[i].trim())) {
              oitems.push(lines[i].trim().replace(/^\d+\.\s+/, '')); i++;
            }
            html.push('<ol>' + oitems.map(function (x) {
              return '<li>' + inlineMd(x) + '</li>';
            }).join('') + '</ol>');
            continue;
          }

          paragraph.push(trimmed);
          i++;
        }

        flushParagraph();
        return html.join('\n');
      }

      // Load metadata
      fetch('data/posts.json')
        .then(function (res) { return res.json(); })
        .then(function (data) {
          var posts = Array.isArray(data.posts) ? data.posts : [];
          var post = posts.find(function (p) { return p.slug === slug; });

          if (!post) {
            shell.innerHTML = '<p class="load-error">Post not found.</p>';
            return;
          }

          // Load markdown content
          fetch('posts/' + slug + '.md')
            .then(function (res) {
              if (!res.ok) throw new Error('Not found');
              return res.text();
            })
            .then(function (md) {
              var date = post.date;
              try { date = new Intl.DateTimeFormat('en', { year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC' }).format(new Date(post.date)); } catch (e) {}

              document.title = post.title + ' | Research Blog';

              shell.innerHTML =
                '<article>' +
                  '<header class="post-header">' +
                    '<h1>' + escapeHtml(post.title) + '</h1>' +
                    '<p class="post-meta">' + date + '</p>' +
                  '</header>' +
                  '<div class="post-body">' + markdownToHtml(md) + '</div>' +
                '</article>';
            })
            .catch(function () {
              shell.innerHTML = '<p class="load-error">Failed to load post content.</p>';
            });
        })
        .catch(function () {
          shell.innerHTML = '<p class="load-error">Failed to load post data.</p>';
        });
    })();
  </script>
</body>

</html>
